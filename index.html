<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <title>Portfolio</title>
    <script>
        // Theme toggle script
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // Persist the theme on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        });
    </script>
</head>
<body>
    <header class="sticky-header">
        <button onclick="toggleTheme()">Toggle Theme</button>
        <img src="assets/couple-avatar.jpg" class="avatar" alt="Avatar">
    </header>
    <main>
        <section id="about">
            <h2>About</h2>
            <p>Your about section content goes here.</p>
        </section>
        <section id="projects">
            <h2>Projects</h2>
            <p>Your projects section content goes here.</p>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <p>Your contact section content goes here.</p>
        </section>
    </main>
</body>
</html>
